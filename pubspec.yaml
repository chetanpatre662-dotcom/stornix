name: stornix
description: An AI study helper Flutter app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  http: ^1.2.0
  provider: ^6.1.2
  flutter_markdown_plus: ^1.0.7
  image_picker: ^1.0.7

  # 🔥 Firebase
  firebase_core: ^4.6.0
  shared_preferences: ^2.2.2
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/stornix_logo.png
    - assets/google_logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/stornix_logo.png"
  adaptive_icon_background: "#000000"